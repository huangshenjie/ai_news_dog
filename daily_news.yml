name: Daily AI News

on:
  schedule:
    # ⚡ 优化策略：设为 UTC 00:25 (北京时间 08:25)
    # 避开全球 00:00 和 00:30 的拥堵高峰，提高准点率
    - cron: '25 0 * * *'
  
  # 保留手动触发按钮 (方便测试)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 设置超时保护，防止任务卡死浪费额度
    timeout-minutes: 15

    steps:
    - name: Checkout content
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 策略：优先用 requirements.txt，同时强制确保核心库存在
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install requests feedparser tavily-python

    - name: Run AI News Script
      env:
        # 🔥 从 Secrets 读取密钥注入环境变量
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        BOCHA_API_KEY: ${{ secrets.BOCHA_API_KEY }}
        WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      run: python ai_news.py
